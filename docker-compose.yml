services:
  capauto-maquette:
    build: .
    container_name: capauto-maquette
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - capauto_data:/app/data
      - capauto_uploads:/app/public/uploads
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=audit-app_web"
      - "traefik.http.routers.capauto-maquette.rule=Host(`capauto-maquette.alsek.fr`)"
      - "traefik.http.routers.capauto-maquette.entrypoints=websecure"
      - "traefik.http.routers.capauto-maquette.tls.certresolver=letsencrypt"
      - "traefik.http.services.capauto-maquette.loadbalancer.server.port=3000"
      - "traefik.http.routers.capauto-maquette-http.rule=Host(`capauto-maquette.alsek.fr`)"
      - "traefik.http.routers.capauto-maquette-http.entrypoints=web"
      - "traefik.http.routers.capauto-maquette-http.middlewares=capauto-maquette-redirect"
      - "traefik.http.middlewares.capauto-maquette-redirect.redirectscheme.scheme=https"

volumes:
  capauto_data:
  capauto_uploads:

networks:
  web:
    external: true
    name: audit-app_web
